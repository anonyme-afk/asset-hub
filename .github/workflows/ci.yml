name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mcp httpx pytest pytest-asyncio ruff
    - name: Lint with Ruff
      run: |
        ruff check asset_hub/ tests/
    - name: Test with pytest
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        python -m pytest tests/ -v --tb=long 2>&1 | tee /tmp/pytest_output.log
    - name: Publier la sortie pytest en cas d'echec (logs Actions illisibles depuis l'exterieur)
      if: failure()
      run: |
        git config user.email "ci@asset-hub"
        git config user.name "asset-hub-ci"
        git checkout --orphan ci-debug-output
        git rm -rf . > /dev/null 2>&1 || true
        cp /tmp/pytest_output.log pytest_output.log
        git add pytest_output.log
        git commit -m "ci debug output for ${{ github.sha }}"
        git push origin ci-debug-output --force
